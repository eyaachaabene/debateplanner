server:
  port: 8080

spring:
  application:
    name: gateway-service

  # ── Spring Cloud Gateway routing ─────────────────────────────────────────────
  cloud:
    gateway:
      # Global default filters applied to every route
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # ── Auth Service ──────────────────────────────────────────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/auth/**

        # ── Academic Service (students) ────────────────────────────────────────
        - id: defense-service-student-results
          uri: ${DEFENSE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/students/me/result,/api/v1/students/*/result

        - id: defense-service
          uri: ${DEFENSE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/defenses/**,/api/v1/jury/**

        - id: academic-service-students
          uri: ${ACADEMIC_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/students/**

        # ── Academic Service (professors) ─────────────────────────────────────
        - id: academic-service-professors
          uri: ${ACADEMIC_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/professors/**

        # ── Room Service ──────────────────────────────────────────────────────
        - id: room-service
          uri: ${ROOM_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/rooms/**

        # ── Defense Service ───────────────────────────────────────────────────
      # Global timeout settings
      httpclient:
        connect-timeout: 5000   # ms
        response-timeout: 30s

# ── JWT Configuration ─────────────────────────────────────────────────────────
jwt:
  # Must match the secret used by auth-service to sign tokens.
  # Override with JWT_SECRET environment variable in production.
  secret-key: dGhpc2lzYXZlcnlzZWN1cmVzZWNyZXRrZXlmb3JqV1RhY2Nlc3N0b2tlbmdlbmVyYXRpb25hbGdvcml0aG0=

# ── CORS ──────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.defense.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Application Info ──────────────────────────────────────────────────────────
info:
  app:
    name: gateway-service
    version: 1.0.0
    description: API Gateway for Academic Defense Management System
