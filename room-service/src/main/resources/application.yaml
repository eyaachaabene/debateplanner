spring:
  application:
    name: room-service

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/room_db
    username: ${DB_USER:room_user}
    password: ${DB_PASS:room_pass}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8083
