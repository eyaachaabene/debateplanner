spring:
  application:
    name: academic-service

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:academic_db}
    username: ${DB_USER:academic_user}
    password: ${DB_PASS:academic_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  Jackson:
    default-property-inclusion: non_null
  web:
    error:
      include-message: never

services:
  auth-url: http://localhost:8085

internal:
  secret: MY_SUPER_SECRET_123

server:
  port: 8082